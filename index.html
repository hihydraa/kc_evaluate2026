<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>K.C. HEART Evaluation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      color: #1f2937;
      padding: 20px;
    }

    .wrap { max-width: 1100px; margin: auto; }

    .head {
      background: #173b6c;
      color: white;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 15px;
    }

    .card {
      background: white;
      padding: 18px;
      border-radius: 14px;
      margin: 12px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .emp {
      cursor: pointer;
      border-left: 6px solid #173b6c;
    }

    .emp:hover {
      background: #eef5ff;
    }

    .section-title {
      font-size: 18px;
      font-weight: bold;
      margin: 10px 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .box {
      background: #f8fafc;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
    }

    .btn {
      background: #173b6c;
      color: white;
      border: 0;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
    }

    .btn.gray { background: #64748b; }

    .score {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .score label {
      display: block;
      text-align: center;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
      cursor: pointer;
      font-weight: bold;
    }

    .score input { display: none; }

    .score input:checked + label {
      background: #173b6c;
      color: white;
    }
  </style>
</head>

<body>
<div class="wrap">

  <div class="head">
    <h2>K.C. HEART Evaluation System</h2>
    <div id="userInfo">ผู้ประเมิน: -</div>
  </div>

  <div id="app"></div>
</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby-T2AJE7CFzCAuZgGqo_cIHdkmoW7HGocKNyH6xvyTUKg4fZ5ulNhBTX-br4WMWOc4uQ/exec"; // <<<<<< ใส่ของคุณตรงนี้
let EVALUATOR_NAME = "";

let employees = [];
let selected = null;
let questions = [];
let dashboard = null;

/* =========================
   INIT
========================= */
window.onload = () => {
  const url = new URLSearchParams(window.location.search);
  EVALUATOR_NAME = url.get("evaluator") || "สุชานรี กองพลพรหม";

  document.getElementById("userInfo").innerText =
    "ผู้ประเมิน: " + EVALUATOR_NAME;

  loadData();
};

/* =========================
   API
========================= */
function api(action, payload = {}) {
  const cb = "cb_" + Date.now();

  return new Promise((resolve, reject) => {
    window[cb] = (res) => {
      resolve(res);
      delete window[cb];
    };

    const script = document.createElement("script");

    const params = new URLSearchParams();
    params.append("action", action);
    params.append("callback", cb);
    params.append("evaluatorName", EVALUATOR_NAME);

    Object.keys(payload).forEach(k => {
      params.append(k, JSON.stringify(payload[k]));
    });

    script.src = WEB_APP_URL + "?" + params.toString();

    script.onerror = () => reject("API error");

    document.body.appendChild(script);
  });
}

/* =========================
   LOAD DATA
========================= */
async function loadData() {
  const res = await api("init");

  employees = res.employees || [];
  dashboard = await api("dashboard");

  renderHome();
}

/* =========================
   HOME
========================= */
function renderHome() {

  let html = `
    <div class="card">
      <div class="section-title">📊 Dashboard Summary</div>

      <div class="grid">
        <div class="box">
          <b>Overall Avg</b><br>
          ${dashboard.overall?.average?.toFixed(2) || 0}
        </div>

        <div class="box">
          <b>Employees</b><br>
          ${dashboard.overall?.employeeCount || 0}
        </div>

        <div class="box">
          <b>Total Answers</b><br>
          ${dashboard.overall?.questionCount || 0}
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">👤 รายชื่อรอประเมิน</div>
  `;

  employees.forEach((e,i) => {
    html += `
      <div class="card emp" onclick="openForm(${i})">
        <b>${e.employee}</b><br>
        ${e.employeePosition} | ${e.bu}
      </div>
    `;
  });

  html += `
    </div>

    <div class="card">
      <div class="section-title">📈 Benchmark (Position)</div>
  `;

  (dashboard.benchmark || []).forEach(b => {
    html += `
      <div class="box">
        ${b.position} → ${b.avgScore.toFixed(2)}
      </div>
    `;
  });

  html += `
    </div>

    <div class="card">
      <div class="section-title">🏢 BU Overview</div>
  `;

  (dashboard.buSummary || []).forEach(b => {
    html += `
      <div class="box">
        ${b.bu} → ${b.avgScore.toFixed(2)}
      </div>
    `;
  });

  html += `</div>`;

  document.getElementById("app").innerHTML = html;
}

/* =========================
   OPEN FORM
========================= */
async function openForm(i) {
  selected = employees[i];
  const res = await api("getForm", { employeeData: selected });

  questions = res.questions || [];

  let html = `
    <div class="card">
      <b>${selected.employee}</b><br>
      ${selected.employeePosition} | ${selected.bu}
    </div>
  `;

  questions.forEach((q, i) => {
    html += `
      <div class="card">
        <b>${q.coreValue}</b><br>
        ${q.checklist}<br><br>

        <div class="score">
          ${[5,4,3,2,1].map(s => `
            <div>
              <input type="radio" id="s${i}_${s}" name="q${i}" value="${s}">
              <label for="s${i}_${s}">${s}</label>
            </div>
          `).join("")}
        </div>

        <textarea id="n${i}" placeholder="note"></textarea>
      </div>
    `;
  });

  html += `
    <button class="btn" onclick="submit()">Submit</button>
    <button class="btn gray" onclick="loadData()">Back</button>
  `;

  document.getElementById("app").innerHTML = html;
}

/* =========================
   SUBMIT
========================= */
async function submit() {

  const answers = [];

  for (let i=0;i<questions.length;i++) {
    let score = document.querySelector(`input[name=q${i}]:checked`);
    if (!score) return alert("missing score");

    answers.push({
      ...questions[i],
      score: score.value,
      note: document.getElementById("n"+i).value
    });
  }

  await api("submit", {
    payload: {
      evaluator: EVALUATOR_NAME,
      evaluatorPosition: "",
      employee: selected.employee,
      employeePosition: selected.employeePosition,
      bu: selected.bu,
      answers
    }
  });

  alert("saved");
  loadData();
}

</script>
</body>
</html>
