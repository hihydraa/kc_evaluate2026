<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>K.C. HEART Evaluation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Chart + PDF -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    :root {
      --blue:#173b6c;
      --blue2:#244a83;
      --bg:#f4f6f9;
      --text:#1f2937;
      --muted:#6b7280;
      --card:#fff;
      --line:#e5e7eb;
      --s5:#16a34a;
      --s4:#65a30d;
      --s3:#d97706;
      --s2:#ea580c;
      --s1:#dc2626;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial;
      background:linear-gradient(180deg,#f8fafc,#eef2f7);
      padding:24px;
      color:var(--text);
    }

    .wrap{max-width:1100px;margin:auto}

    .head{
      background:linear-gradient(135deg,var(--blue),var(--blue2));
      color:#fff;
      padding:24px;
      border-radius:18px;
      margin-bottom:16px;
    }

    .card{
      background:#fff;
      padding:18px;
      border-radius:16px;
      margin:12px 0;
      box-shadow:0 6px 18px rgba(0,0,0,.08);
    }

    .section-title{
      color:var(--blue);
      font-weight:900;
      margin-bottom:12px;
    }

    .btn-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin:12px 0;
    }

    button{
      background:var(--blue);
      color:#fff;
      border:0;
      padding:10px 14px;
      border-radius:10px;
      font-weight:800;
      cursor:pointer;
    }

    button.gray{background:#64748b}

    .grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
    }

    .box{
      background:#f8fafc;
      padding:12px;
      border-radius:12px;
      border:1px solid #e5e7eb;
    }

    .emp{cursor:pointer}
    .emp:hover{background:#eef6ff}

    .q{border:1px solid #eee;padding:12px;border-radius:12px;margin:10px 0}

    canvas{max-width:100%}

    @media(max-width:768px){
      .grid{grid-template-columns:1fr}
    }
  </style>
</head>

<body>
<div class="wrap">

  <div class="head">
    <h2>K.C. HEART Evaluation System</h2>
    <div>ผู้ประเมิน: สุชานรี กองพลพรหม</div>
  </div>

  <div class="btn-row">
    <button onclick="renderEmployeeList()">📋 รายชื่อ</button>
    <button onclick="loadDashboard()">📊 Dashboard</button>
  </div>

  <div id="app"></div>

</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby6NWH7qal1TvzcE4kK8D21ia_h3WWptA0oN5SXngb42IKfploqx4fmZpSKb829ZzdyRQ/exec";
const EVALUATOR_NAME = "สุชานรี กองพลพรหม";

let employees=[], questions=[], selected=null;

// ================= API =================
function api(action,payload={}){
  return new Promise((resolve,reject)=>{
    const cb="cb_"+Date.now();
    window[cb]=d=>{resolve(d);delete window[cb];};

    const s=document.createElement("script");
    const p=new URLSearchParams({action,callback:cb});

    Object.keys(payload).forEach(k=>{
      p.append(k,typeof payload[k]==="object"?JSON.stringify(payload[k]):payload[k]);
    });

    s.src=WEB_APP_URL+"?"+p.toString();
    document.body.appendChild(s);
  });
}

// ================= LOAD =================
window.onload=loadData;

async function loadData(){
  const res=await api("init",{evaluatorName:EVALUATOR_NAME});
  employees=res.employees||[];
  renderEmployeeList();
}

// ================= LIST =================
function renderEmployeeList(){
  let html=`
    <div class="card">
      <h3 class="section-title">รายการรอประเมิน</h3>
      <div class="grid">
        <div class="box">รอประเมิน: ${employees.length}</div>
        <div class="box">ผู้ประเมิน: ${EVALUATOR_NAME}</div>
        <div class="box">สถานะ: พร้อมใช้งาน</div>
      </div>
    </div>
  `;

  employees.forEach((e,i)=>{
    html+=`
      <div class="card emp" onclick="openForm(${i})">
        <b>${e.employee}</b><br>
        ${e.employeePosition} | ${e.bu}
      </div>
    `;
  });

  document.getElementById("app").innerHTML=html;
}

// ================= FORM =================
async function openForm(i){
  selected=employees[i];
  const res=await api("getForm",{employeeData:selected});
  questions=res.questions||[];

  let html=`
    <div class="card">
      <h3>${selected.employee}</h3>
    </div>
  `;

  questions.forEach((q,idx)=>{
    html+=`
      <div class="q">
        <b>${q.coreValue}</b><br>
        ${q.checklist}<br><br>

        ${[1,2,3,4,5].map(s=>`
          <label>
            <input type="radio" name="q${idx}" value="${s}"> ${s}
          </label>
        `).join("")}

        <textarea id="n${idx}" placeholder="หมายเหตุ"></textarea>
      </div>
    `;
  });

  html+=`
    <button onclick="submit()">ส่งผล</button>
    <button class="gray" onclick="renderEmployeeList()">กลับ</button>
  `;

  document.getElementById("app").innerHTML=html;
}

// ================= SUBMIT =================
async function submit(){
  let answers=[];

  for(let i=0;i<questions.length;i++){
    let s=document.querySelector(`input[name="q${i}"]:checked`);
    if(!s){alert("กรุณาให้คะแนนครบ");return;}

    answers.push({
      ...questions[i],
      score:s.value,
      note:document.getElementById("n"+i).value
    });
  }

  await api("submit",{payload:{
    evaluator:EVALUATOR_NAME,
    employee:selected.employee,
    answers
  }});

  alert("บันทึกแล้ว");
  loadData();
}

// ================= DASHBOARD =================
async function loadDashboard(){
  const res=await api("getOverview",{evaluatorName:EVALUATOR_NAME});

  let html=`
    <div class="card">
      <h3>📊 Dashboard</h3>

      <div class="grid">
        <div class="box">ประเมินแล้ว: ${res.totalEvaluated}</div>
        <div class="box">คะแนนเฉลี่ย: ${res.avgScore}</div>
        <div class="box">พนักงาน: ${res.totalEmployees}</div>
      </div>
    </div>

    <div class="card">
      <h3>Distribution</h3>
      <canvas id="c1"></canvas>
    </div>

    <div class="card">
      <h3>ตำแหน่ง</h3>
      <canvas id="c2"></canvas>
    </div>
  `;

  document.getElementById("app").innerHTML=html;

  new Chart(document.getElementById("c1"),{
    type:"bar",
    data:{
      labels:["1","2","3","4","5"],
      datasets:[{data:res.scoreDistribution}]
    }
  });

  new Chart(document.getElementById("c2"),{
    type:"bar",
    data:{
      labels:res.positionLabels,
      datasets:[{data:res.positionAvg}]
    }
  });
}

// ================= PDF =================
function exportPDF(){
  html2pdf().from(document.body).save();
}
</script>

</body>
</html>
