<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K.C. HEART Core Value Evaluation</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      color-scheme: light only;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f8fafc, #eef2f7);
      color: #1f2937;
      padding: 20px;
      margin: 0;
    }

    .wrap {
      max-width: 800px;
      margin: auto;
    }

    .head {
      background: linear-gradient(135deg, #173b6c, #244a83);
      color: white;
      padding: 28px;
      border-radius: 22px;
      box-shadow: 0 12px 28px rgba(23, 59, 108, 0.22);
      margin-bottom: 18px;
    }

    .head h2 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .head div {
      opacity: 0.95;
      font-weight: 600;
      font-size: 14px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 18px;
      margin-bottom: 16px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
      border: 1px solid rgba(226, 232, 240, 0.9);
    }

    .section-title {
      font-size: 20px;
      margin: 0 0 14px;
      color: #173b6c;
      font-weight: 800;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .info-box {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 12px;
    }

    .info-label {
      color: #6b7280;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .info-value {
      font-weight: 700;
    }

    .employee-card {
      cursor: pointer;
      border-left: 7px solid #173b6c;
      transition: 0.18s;
    }

    .employee-card:hover {
      transform: translateY(-2px);
      background: #f1f7ff;
      box-shadow: 0 12px 28px rgba(23, 59, 108, 0.14);
    }

    .employee-name {
      margin: 0 0 8px;
      font-size: 21px;
      color: #173b6c;
    }

    .score-visual {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .score-guide {
      border-radius: 16px;
      padding: 14px;
      color: white;
      min-height: 124px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .score-guide .num {
      font-size: 30px;
      font-weight: 800;
    }

    .score-guide .name {
      font-weight: 800;
      margin: 8px 0 4px;
    }

    .score-guide .desc {
      font-size: 13px;
      line-height: 1.45;
      opacity: 0.96;
    }

    .s5 { background: #16a34a; }
    .s4 { background: #65a30d; }
    .s3 { background: #d97706; }
    .s2 { background: #ea580c; }
    .s1 { background: #dc2626; }

    .question {
      background: white;
      padding: 20px;
      border-radius: 18px;
      margin: 16px 0;
      border: 1px solid #e5e7eb;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
    }

    .question-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .core-badge {
      display: inline-flex;
      align-items: center;
      background: #eaf2ff;
      color: #173b6c;
      font-weight: 800;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 13px;
    }

    .question-no {
      color: #6b7280;
      font-weight: 700;
      font-size: 13px;
    }

    .question-text {
      font-size: 17px;
      font-weight: 800;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .meta {
      font-size: 14px;
      color: #4b5563;
      margin-top: 10px;
      line-height: 1.6;
      background: #f8fafc;
      padding: 12px;
      border-radius: 14px;
      border: 1px dashed #cbd5e1;
    }

    .score-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-top: 16px;
    }

    .score-option {
      cursor: pointer;
    }

    .score-option input {
      display: none;
    }

    .score-pill {
      display: block;
      text-align: center;
      padding: 12px 8px;
      border-radius: 14px;
      border: 2px solid #e5e7eb;
      background: #fff;
      font-weight: 800;
      transition: 0.18s;
    }

    .score-option input:checked + .score-pill {
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.18);
    }

    .score-option input[value="5"]:checked + .score-pill { background: #16a34a; border-color: #16a34a; }
    .score-option input[value="4"]:checked + .score-pill { background: #65a30d; border-color: #65a30d; }
    .score-option input[value="3"]:checked + .score-pill { background: #d97706; border-color: #d97706; }
    .score-option input[value="2"]:checked + .score-pill { background: #ea580c; border-color: #ea580c; }
    .score-option input[value="1"]:checked + .score-pill { background: #dc2626; border-color: #dc2626; }

    textarea {
      width: 100%;
      min-height: 70px;
      margin-top: 14px;
      border-radius: 14px;
      border: 1px solid #cbd5e1;
      padding: 12px;
      font-family: Arial, sans-serif;
      resize: vertical;
      outline: none;
    }

    textarea:focus {
      border-color: #173b6c;
      box-shadow: 0 0 0 3px rgba(23, 59, 108, 0.12);
    }

    button {
      background: #173b6c;
      color: white;
      border: 0;
      padding: 13px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 800;
      font-size: 15px;
      box-shadow: 0 8px 18px rgba(23, 59, 108, 0.18);
      transition: 0.18s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(23, 59, 108, 0.25);
    }

    button.gray {
      background: #64748b;
      box-shadow: none;
    }

    button:disabled {
      background: #aaa;
      cursor: not-allowed;
      transform: none;
    }

    .action-row {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .loading {
      text-align: center;
      padding: 48px 20px;
      color: #6b7280;
      font-weight: 700;
      font-size: 16px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e5e7eb;
      border-top-color: #173b6c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 14px;
      padding: 16px;
      color: #991b1b;
    }

    @media (max-width: 800px) {
      body {
        padding: 12px;
      }

      .head {
        padding: 20px;
      }

      .head h2 {
        font-size: 20px;
      }

      .score-visual, .info-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .score-row {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="head">
      <h2>K.C. HEART Core Value Evaluation</h2>
      <div>GitHub Version - K.C. Heart Evaluation Form</div>
      <div id="head-evaluator">ผู้ประเมิน: -</div>
    </div>

    <div id="app-content"></div>
  </div>

  <script>
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // ⚠️  แก้ไข URL นี้ให้เป็น URL ของ Google Apps Script ของคุณ
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxhvD3MMMzzryiEH_PJvwX4whqn3d3v_UVtICzCId-Hthby0aWPvoCOIN3GbDaqIs6U_g/exec';
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    // STATE
    const urlParams = new URLSearchParams(window.location.search);
    let EVALUATOR_NAME = (urlParams.get('evaluator') || '').trim();

    let employees = [];
    let questions = [];
    let selectedEmployee = null;
    let scoreGuide = [];

    const defaultGuide = [
      { score: 5, meaning: 'ดีเยี่ยม / เป็นแบบอย่าง', description: 'ปฏิบัติสม่ำเสมอ มีหลักฐานชัดเจน และเป็นตัวอย่างให้ผู้อื่น' },
      { score: 4, meaning: 'ดี / ผ่านมาตรฐาน', description: 'ปฏิบัติได้ดี มีหลักฐานสนับสนุน ไม่มีประเด็นสำคัญ' },
      { score: 3, meaning: 'พอใช้ / เฝ้าระวัง', description: 'ปฏิบัติได้บางส่วน แต่ยังไม่สม่ำเสมอหรือหลักฐานไม่ครบ' },
      { score: 2, meaning: 'ต้องปรับปรุง', description: 'พบข้อบกพร่องชัดเจน ต้องมีแผนแก้ไข' },
      { score: 1, meaning: 'ไม่ปฏิบัติ / เสี่ยงสูง', description: 'ไม่พบการปฏิบัติ หรือพบพฤติกรรมขัดกับ Core Value' }
    ];

    // HELPERS
    function el(id) { return document.getElementById(id); }
    function set(id, html) { const e = el(id); if (e) e.innerHTML = html; }

    function loading(msg = 'กำลังโหลด...') {
      set('app-content', `<div class="card loading"><div class="spinner"></div>${msg}</div>`);
    }

    function showError(msg) {
      set('app-content', `<div class="card error-box"><b>⚠ เกิดข้อผิดพลาด</b><br><br>${msg}</div>`);
    }

    // API
    function api(action, payload = {}) {
      return new Promise((resolve, reject) => {
        const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
        const script = document.createElement('script');

        const timer = setTimeout(() => {
          reject(new Error('Request timeout'));
          delete window[cb];
          script.remove();
        }, 20000);

        window[cb] = data => {
          clearTimeout(timer);
          resolve(data);
          delete window[cb];
          script.remove();
        };

        const params = new URLSearchParams({ action, callback: cb, evaluatorName: EVALUATOR_NAME });
        Object.entries(payload).forEach(([k, v]) => {
          params.set(k, typeof v === 'object' ? JSON.stringify(v) : v);
        });

        script.src = WEB_APP_URL + '?' + params.toString();
        script.onerror = () => {
          clearTimeout(timer);
          reject(new Error('Network error'));
          delete window[cb];
          script.remove();
        };
        document.body.appendChild(script);
      });
    }

    async function apiPost(action, payload = {}) {
      const response = await fetch(WEB_APP_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({ action, ...payload })
      });
      return { success: true };
    }

    // INIT
    window.onload = bootstrap;

    async function bootstrap() {
      if (!EVALUATOR_NAME) {
        await renderEvaluatorDirectory();
        return;
      }
      el('head-evaluator').textContent = 'ผู้ประเมิน: ' + EVALUATOR_NAME;
      loadData();
    }

    // EVALUATOR DIRECTORY
    async function renderEvaluatorDirectory() {
      loading('กำลังโหลดรายชื่อผู้ประเมิน...');
      try {
        const r = await api('listEvaluators');
        if (!r.success) throw new Error(r.message || 'โหลดไม่สำเร็จ');

        const list = r.evaluators || [];
        if (!list.length) {
          set('app-content', `<div class="card error-box">ไม่พบรายชื่อผู้ประเมิน</div>`);
          return;
        }

        const base = window.location.origin + window.location.pathname;
        let html = `<div class="card">
          <h3 class="section-title">เลือกผู้ประเมิน</h3>
          <div class="info-grid"><div class="info-box"><div class="info-label">รวม</div><div class="info-value">${list.length} คน</div></div></div>
        </div>`;

        list.forEach(ev => {
          const link = base + '?evaluator=' + encodeURIComponent(ev.evaluator);
          html += `<a href="${link}" style="text-decoration:none">
            <div class="card employee-card">
              <h3 class="employee-name">${ev.evaluator}</h3>
              <div class="info-grid">
                <div class="info-box"><div class="info-label">ตำแหน่ง</div><div class="info-value">${ev.position || '-'}</div></div>
              </div>
            </div>
          </a>`;
        });

        set('app-content', html);
      } catch (err) {
        showError(err.message);
      }
    }

    // LOAD DATA
    async function loadData() {
      loading('กำลังโหลด...');
      try {
        const r = await api('init');
        if (!r.success) throw new Error(r.message || 'โหลดไม่สำเร็จ');

        employees = r.employees || [];
        scoreGuide = (r.scoreGuide && r.scoreGuide.length) ? r.scoreGuide : defaultGuide;
        renderList();
      } catch (err) {
        showError(err.message);
      }
    }

    function renderList() {
      let html = `
        <div class="card">
          <h3 class="section-title">รายการรอประเมิน</h3>
          <div class="info-grid">
            <div class="info-box"><div class="info-label">ผู้ประเมิน</div><div class="info-value">${EVALUATOR_NAME}</div></div>
            <div class="info-box"><div class="info-label">รอประเมิน</div><div class="info-value">${employees.length}</div></div>
            <div class="info-box"><div class="info-label">สถานะ</div><div class="info-value">พร้อมประเมิน</div></div>
          </div>
        </div>
      `;

      if (!employees.length) {
        html += `<div class="card" style="text-align:center;padding:40px">✅ ประเมินครบแล้ว</div>`;
      } else {
        html += `<div class="section-title" style="margin-top:8px">รายชื่อพนักงาน</div>`;
        employees.forEach((e, i) => {
          html += `<div class="card employee-card" onclick="openForm(${i})">
            <h3 class="employee-name">${e.employee}</h3>
            <div class="info-grid">
              <div class="info-box"><div class="info-label">ตำแหน่ง</div><div class="info-value">${e.employeePosition}</div></div>
              <div class="info-box"><div class="info-label">สังกัด</div><div class="info-value">${e.bu}</div></div>
              <div class="info-box"><div class="info-label">สถานะ</div><div class="info-value">รอประเมิน →</div></div>
            </div>
          </div>`;
        });
      }

      set('app-content', html);
    }

    async function openForm(i) {
      selectedEmployee = employees[i];
      loading('กำลังโหลดแบบประเมิน...');

      try {
        const r = await api('getForm', { employeeData: selectedEmployee });
        if (!r.success) throw new Error(r.message || 'โหลดไม่สำเร็จ');

        questions = r.questions || [];
        renderForm();
      } catch (err) {
        showError(err.message);
      }
    }

    function renderForm() {
      const guide = [...scoreGuide].sort((a, b) => Number(b.score) - Number(a.score));
      let html = `
        <div class="card">
          <h3 class="section-title">แบบประเมิน: ${selectedEmployee.employee}</h3>
          <div class="info-grid">
            <div class="info-box"><div class="info-label">ตำแหน่ง</div><div class="info-value">${selectedEmployee.employeePosition}</div></div>
            <div class="info-box"><div class="info-label">สังกัด</div><div class="info-value">${selectedEmployee.bu}</div></div>
            <div class="info-box"><div class="info-label">จำนวนข้อ</div><div class="info-value">${questions.length}</div></div>
          </div>
        </div>
        <div class="card">
          <h3 class="section-title">เกณฑ์การให้คะแนน</h3>
          <div class="score-visual">
            ${guide.map(g => `<div class="score-guide s${g.score}"><div><div class="num">${g.score}</div><div class="name">${g.meaning}</div></div><div class="desc">${g.description}</div></div>`).join('')}
          </div>
        </div>
      `;

      if (!questions.length) {
        html += `<div class="card">ไม่พบคำถาม</div><div class="action-row"><button class="gray" onclick="renderList()">← กลับ</button></div>`;
        set('app-content', html);
        return;
      }

      questions.forEach((q, i) => {
        html += `<div class="question">
          <div class="question-top"><div class="core-badge">${q.coreValue}</div><div class="question-no">ข้อที่ ${i + 1}</div></div>
          <div class="question-text">${q.checklist}</div>
          <div class="meta"><b>หลักฐาน:</b> ${q.evidence || '-'}<br><b>วิธีตรวจ:</b> ${q.method || '-'}</div>
          <div class="score-row">
            ${[5, 4, 3, 2, 1].map(s => `<label class="score-option"><input type="radio" name="sc_${i}" value="${s}"><span class="score-pill">${s}</span></label>`).join('')}
          </div>
          <textarea id="nt_${i}" placeholder="หมายเหตุเพิ่มเติม"></textarea>
        </div>`;
      });

      html += `<div class="action-row">
        <button class="gray" onclick="renderList()">← กลับ</button>
        <button id="submitBtn" onclick="doSubmit()">✔ ส่งผลประเมิน</button>
      </div>`;

      set('app-content', html);
    }

    async function doSubmit() {
      const answers = [];
      for (let i = 0; i < questions.length; i++) {
        const c = document.querySelector(`input[name="sc_${i}"]:checked`);
        if (!c) {
          alert(`กรุณาให้คะแนนข้อที่ ${i + 1}`);
          return;
        }
        answers.push({
          ...questions[i],
          score: c.value,
          note: (el('nt_' + i) || {}).value || ''
        });
      }

      el('submitBtn').disabled = true;
      loading('กำลังบันทึก...');

      try {
        await apiPost('submit', {
          payload: {
            evaluator: EVALUATOR_NAME,
            evaluatorPosition: selectedEmployee.evaluatorPosition || '',
            employee: selectedEmployee.employee,
            employeePosition: selectedEmployee.employeePosition,
            bu: selectedEmployee.bu,
            answers
          }
        });

        alert('บันทึกสำเร็จ ✅');
        loadData();
      } catch (err) {
        showError(err.message);
      }
    }
  </script>
</body>

</html>
