<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>K.C. HEART Evaluation</title>

  <script src="https://apis.google.com/js/api.js"></script>
  <script src="https://accounts.google.com/gsi/client"></script>

  <style>
    body { font-family: Arial, sans-serif; background:#f4f6f9; padding:24px; }
    .wrap { max-width:1100px; margin:auto; }
    .head { background:#173b6c; color:white; padding:20px; border-radius:14px; }
    .card { background:white; padding:18px; border-radius:14px; margin:14px 0; box-shadow:0 2px 8px #0001; }
    .emp { cursor:pointer; border-left:6px solid #173b6c; }
    .emp:hover { background:#eef5ff; }
    .q { border:1px solid #ddd; padding:16px; border-radius:12px; margin:12px 0; background:white; }
    .core { color:#173b6c; font-weight:bold; margin-bottom:8px; }
    .meta { color:#666; font-size:13px; margin-top:8px; line-height:1.5; }
    button { background:#173b6c; color:white; border:0; padding:12px 18px; border-radius:10px; cursor:pointer; }
    button.gray { background:#777; }
    textarea { width:100%; min-height:55px; margin-top:10px; }
    .score label { margin-right:12px; }
  </style>
</head>

<body>
<div class="wrap">
  <div class="head">
    <h2>K.C. HEART Core Value Evaluation</h2>
    <div>ผู้ประเมิน: สุชานรี กองพลพรหม</div>
  </div>

  <div class="card">
    <button onclick="login()">เข้าสู่ระบบ Google</button>
  </div>

  <div id="app"></div>
</div>

<script>
const SPREADSHEET_ID = '1eZAysnGnULf1qFLddnI80Hwo4UzmMuxZV3SNesO5A4w';

const API_KEY = 'ใส่_API_KEY';
const CLIENT_ID = 'ใส่_CLIENT_ID';

const EVALUATOR_NAME = 'สุชานรี กองพลพรหม';
const RESULT_SHEET = 'ผลการประเมิน';

const SCOPES = 'https://www.googleapis.com/auth/spreadsheets';

let tokenClient;
let employees = [];
let selectedEmployee = null;
let questions = [];
let scoreGuide = [];

function init() {
  gapi.load('client', async () => {
    await gapi.client.init({
      apiKey: API_KEY,
      discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4']
    });
  });

  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async () => {
      await ensureResultSheet();
      await loadData();
    }
  });
}

function login() {
  tokenClient.requestAccessToken();
}

async function readRange(range) {
  const res = await gapi.client.sheets.spreadsheets.values.get({
    spreadsheetId: SPREADSHEET_ID,
    range
  });
  return res.result.values || [];
}

async function loadData() {
  const assessor = await readRange('ผู้ประเมิน!A:F');
  const result = await readRange(`${RESULT_SHEET}!A:N`);
  scoreGuide = await readRange('คะแนน!A:C');

  const evaluated = new Set();

  result.slice(1).forEach(r => {
    const evaluator = r[1];
    const employee = r[3];
    const position = r[4];
    const bu = r[5];
    evaluated.add(`${evaluator}|${employee}|${position}|${bu}`);
  });

  employees = [];

  assessor.slice(1).forEach(r => {
    const evaluator = r[1];
    const evaluatorPosition = r[2];
    const bu = r[3];
    const employee = r[4];
    const employeePosition = r[5];

    if (!employee) return;
    if (evaluator !== EVALUATOR_NAME) return;

    const key = `${evaluator}|${employee}|${employeePosition}|${bu}`;

    if (!evaluated.has(key)) {
      employees.push({
        evaluator,
        evaluatorPosition,
        bu,
        employee,
        employeePosition
      });
    }
  });

  renderEmployeeList();
}

function renderEmployeeList() {
  const app = document.getElementById('app');

  if (employees.length === 0) {
    app.innerHTML = `<div class="card">ไม่มีรายชื่อพนักงานที่รอประเมิน</div>`;
    return;
  }

  let html = `<h3>รายชื่อพนักงานที่ยังไม่ประเมิน</h3>`;

  employees.forEach((emp, i) => {
    html += `
      <div class="card emp" onclick="openForm(${i})">
        <h3>${emp.employee}</h3>
        <div>ตำแหน่ง: ${emp.employeePosition}</div>
        <div>สังกัด: ${emp.bu}</div>
      </div>
    `;
  });

  app.innerHTML = html;
}

async function openForm(index) {
  selectedEmployee = employees[index];

  const data = await readRange(`${selectedEmployee.bu}!A:G`);

  questions = data.slice(4)
    .filter(r => r[4])
    .filter(r => r[1] === selectedEmployee.employeePosition)
    .map(r => ({
      no: r[0],
      position: r[1],
      jdGroup: r[2],
      coreValue: r[3],
      checklist: r[4],
      evidence: r[5],
      method: r[6]
    }));

  renderForm();
}

function renderForm() {
  const app = document.getElementById('app');

  let guide = `<div class="card"><b>เกณฑ์การให้คะแนน</b><br>`;
  scoreGuide.slice(1).forEach(r => {
    if (r[0]) guide += `${r[0]} = ${r[1]} : ${r[2]}<br>`;
  });
  guide += `</div>`;

  let html = `
    <div class="card">
      <h3>แบบประเมิน: ${selectedEmployee.employee}</h3>
      <div>ตำแหน่ง: ${selectedEmployee.employeePosition}</div>
      <div>สังกัด: ${selectedEmployee.bu}</div>
    </div>
    ${guide}
  `;

  if (questions.length === 0) {
    html += `
      <div class="card">ไม่พบคำถามของตำแหน่งนี้ในชีท ${selectedEmployee.bu}</div>
      <button class="gray" onclick="renderEmployeeList()">กลับ</button>
    `;
    app.innerHTML = html;
    return;
  }

  questions.forEach((q, i) => {
    html += `
      <div class="q">
        <div class="core">${q.coreValue}</div>
        <b>${i + 1}. ${q.checklist}</b>

        <div class="meta">
          หลักฐานที่ใช้ตรวจ: ${q.evidence || '-'}<br>
          วิธีตรวจสอบ: ${q.method || '-'}
        </div>

        <div class="score">
          ${[1,2,3,4,5].map(s => `
            <label>
              <input type="radio" name="score_${i}" value="${s}">
              ${s}
            </label>
          `).join('')}
        </div>

        <textarea id="note_${i}" placeholder="หมายเหตุเพิ่มเติม"></textarea>
      </div>
    `;
  });

  html += `
    <button class="gray" onclick="renderEmployeeList()">กลับ</button>
    <button onclick="submitEvaluation()">ส่งผลประเมิน</button>
  `;

  app.innerHTML = html;
}

async function submitEvaluation() {
  const rows = [];
  const evaluationId = crypto.randomUUID();
  const now = new Date().toLocaleString('th-TH');

  for (let i = 0; i < questions.length; i++) {
    const checked = document.querySelector(`input[name="score_${i}"]:checked`);

    if (!checked) {
      alert(`กรุณาให้คะแนนข้อที่ ${i + 1}`);
      return;
    }

    const q = questions[i];

    rows.push([
      evaluationId,
      selectedEmployee.evaluator,
      selectedEmployee.evaluatorPosition,
      selectedEmployee.employee,
      selectedEmployee.employeePosition,
      selectedEmployee.bu,
      q.no,
      q.coreValue,
      q.checklist,
      q.evidence || '',
      q.method || '',
      checked.value,
      document.getElementById(`note_${i}`).value,
      now
    ]);
  }

  await gapi.client.sheets.spreadsheets.values.append({
    spreadsheetId: SPREADSHEET_ID,
    range: `${RESULT_SHEET}!A:N`,
    valueInputOption: 'USER_ENTERED',
    insertDataOption: 'INSERT_ROWS',
    resource: { values: rows }
  });

  alert('บันทึกผลการประเมินเรียบร้อยแล้ว');

  await loadData();
}

async function ensureResultSheet() {
  const meta = await gapi.client.sheets.spreadsheets.get({
    spreadsheetId: SPREADSHEET_ID
  });

  const exists = meta.result.sheets.some(s => s.properties.title === RESULT_SHEET);

  if (!exists) {
    await gapi.client.sheets.spreadsheets.batchUpdate({
      spreadsheetId: SPREADSHEET_ID,
      resource: {
        requests: [{
          addSheet: {
            properties: { title: RESULT_SHEET }
          }
        }]
      }
    });

    await gapi.client.sheets.spreadsheets.values.update({
      spreadsheetId: SPREADSHEET_ID,
      range: `${RESULT_SHEET}!A1:N1`,
      valueInputOption: 'USER_ENTERED',
      resource: {
        values: [[
          'Evaluation ID',
          'ผู้ประเมิน',
          'ตำแหน่ง_ผู้ประเมิน',
          'ผู้รับประเมิน',
          'ตำแหน่ง_ผู้รับประเมิน',
          'สังกัด',
          'No.',
          'Core Value',
          'รายการตรวจสอบพฤติกรรม',
          'หลักฐานที่ใช้ตรวจ',
          'วิธีตรวจสอบ',
          'คะแนน',
          'หมายเหตุ',
          'วันที่บันทึก'
        ]]
      }
    });
  }
}

init();
</script>
</body>
</html>
